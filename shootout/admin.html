<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Progressive Shootout // Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .stage-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; border-bottom: 1px solid var(--border-light, rgba(255,255,255,0.12)); padding-bottom: 12px; }
    .stage-tab { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono, monospace); font-size: 12px; font-weight: 600; padding: 8px 12px; border-radius: 5px; cursor: pointer; border: 1px solid var(--border-light, rgba(255,255,255,0.15)); background: var(--surface-2, rgba(255,255,255,0.03)); color: var(--text-muted, #aaa); }
    .stage-tab.active { background: var(--accent, #e0a92e); color: var(--bg, #111); border-color: transparent; }
    .stage-tab-dot { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px; font-weight: 700; }
    .stage-tab-dot.pending { background: rgba(255,255,255,0.12); color: #ccc; }
    .stage-tab-dot.live { background: #d9822b; color: #fff; }
    .stage-tab-dot.complete { background: #3a9d5d; color: #fff; }
    .stage-tab.active .stage-tab-dot { background: rgba(0,0,0,0.18); color: var(--bg, #111); }
    .stage-head { margin-bottom: 14px; }
    .stage-head-title { display: block; font-family: var(--font-mono, monospace); font-size: 16px; font-weight: 700; }
    .stage-head-desc { display: block; font-size: 12px; color: var(--text-muted, #999); margin-top: 3px; }
    .stage-head-actions { margin-top: 8px; }
    .stage-empty { padding: 24px; text-align: center; color: var(--text-muted, #999); border: 1px dashed var(--border-light, rgba(255,255,255,0.15)); border-radius: 8px; }
    .stage-pending { font-size: 14px; }
    .pending-tag { display: inline-block; font-family: var(--font-mono, monospace); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; background: rgba(255,255,255,0.12); color: #ddd; margin-right: 6px; }
    .btn-generate, .btn-confirm-rebuy, .btn-reseat-tab { font-family: var(--font-body, sans-serif); font-size: 13px; font-weight: 700; padding: 9px 18px; border-radius: 5px; border: none; cursor: pointer; background: var(--accent, #e0a92e); color: var(--bg, #111); }
    .btn-reseat-tab { background: var(--surface-2, rgba(255,255,255,0.06)); color: var(--text-muted, #ccc); border: 1px solid var(--border-light, rgba(255,255,255,0.15)); font-weight: 600; font-size: 12px; }
    .queue-list-box { margin-top: 16px; }
    .queue-list-title { font-family: var(--font-mono, monospace); font-size: 12px; font-weight: 700; color: var(--text-muted, #999); margin-bottom: 8px; }
    .queue-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .queue-chip { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: var(--surface-2, rgba(255,255,255,0.05)); border: 1px solid var(--border-light, rgba(255,255,255,0.12)); }
    .rebuy-admin { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
    .rebuy-admin-col { background: var(--surface-2, rgba(255,255,255,0.03)); border: 1px solid var(--border-light, rgba(255,255,255,0.1)); border-radius: 8px; padding: 12px; }
    .rebuy-admin-title { font-family: var(--font-mono, monospace); font-size: 12px; font-weight: 700; margin-bottom: 10px; }
    .rebuy-admin-empty { font-size: 12px; color: var(--text-muted, #888); }
    .rebuy-req { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 0; font-size: 13px; border-top: 1px solid var(--border-light, rgba(255,255,255,0.07)); }
    .rebuy-req:first-of-type { border-top: none; }
    .btn-confirm-rebuy { padding: 5px 12px; font-size: 12px; }
    .paid-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #3a9d5d; }
    @media (max-width: 640px) { .rebuy-admin { grid-template-columns: 1fr; } }
  </style>
  <script src="admin-auth.js"></script>
</head>
<body class="admin">

  <div class="loading-overlay hidden" id="loading"><div class="spinner"></div></div>

  <div class="confirm-overlay hidden" id="confirmOverlay">
    <div class="confirm-box">
      <p id="confirmMessage">Are you sure?</p>
      <div class="confirm-actions">
        <button class="btn btn-outline" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <header class="header">
    <h1><a href="./">PROGRESSIVE SHOOTOUT</a> // ADMIN</h1>
    <div class="header-right">
      <a class="btn-pill" href="availability-admin" style="font-family: var(--font-mono); font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border-light); background: var(--surface-2); color: var(--text-muted); text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px;">Availability</a>
      <a class="btn-pill" href="stewards" style="font-family: var(--font-mono); font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border-light); background: var(--surface-2); color: var(--text-muted); text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px;">Stewards</a>
      <span class="status-badge status-setup" id="statusBadge">SETUP</span>
    </div>
  </header>

  <div class="main">

    <aside class="sidebar">

      <!-- PLAYERS -->
      <div class="sidebar-header">
        <h2>Players</h2>
        <div class="add-form" id="addPlayerForm">
          <div class="add-row">
            <input type="text" id="inputName" placeholder="Player name">
            <input type="text" id="inputTornId" placeholder="Torn ID">
          </div>
          <button class="btn-add" id="btnAddPlayer">Add Player</button>
          <div class="lock-notice hidden" id="playerLockNotice">
            Player roster is locked once the tournament is active
          </div>
        </div>
      </div>

      <div class="list" id="playerList"></div>
      <div class="list-count">
        <span id="playerCount">0 players</span>
        <span class="list-count-amount" id="buyInTotal">$0</span>
      </div>

      <!-- DONATIONS -->
      <div class="donations-section">
        <div class="donations-header">
          <h2>Donations</h2>
          <div class="add-form">
            <div class="add-row">
              <input type="text" id="inputDonorName" placeholder="Donor name">
              <input type="text" id="inputDonationAmount" placeholder="Amount (e.g. 5m or 50000000)">
            </div>
            <button class="btn-add" id="btnAddDonation">Add Donation</button>
          </div>
        </div>
        <div class="list" id="donationList"></div>
        <div class="list-count">
          <span>Total donated</span>
          <span class="list-count-amount" id="donationTotal">$0</span>
        </div>
      </div>

    </aside>

    <div class="panel">
      <div class="panel-toolbar">
        <h2>Tournament Management</h2>
      </div>
      <div class="panel-content" id="panelContent">
        <!-- Populated by renderTournamentPanel() -->
      </div>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    var state = { settings: {}, players: [], donations: [], tables: [], eliminations: [], queues: [] };

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('btnAddPlayer').addEventListener('click', addPlayer);
      document.getElementById('btnAddDonation').addEventListener('click', addDonation);

      document.getElementById('inputName').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('inputTornId').focus();
      });
      document.getElementById('inputTornId').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') addPlayer();
      });
      document.getElementById('inputDonorName').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('inputDonationAmount').focus();
      });
      document.getElementById('inputDonationAmount').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') addDonation();
      });

      fetchState();
    });

    // --- API ---
    function apiCall(action, params, callback) {
      var url = API_URL + '?action=' + encodeURIComponent(action);
      if (params) {
        Object.keys(params).forEach(function(key) {
          url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
        });
      }

      showLoading(true);

      fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          showLoading(false);
          if (data.error) {
            toast(data.error, 'error');
          } else if (callback) {
            callback(data);
          }
        })
        .catch(function(err) {
          showLoading(false);
          toast('Request failed: ' + err.message, 'error');
        });
    }

    function fetchState() {
      apiCall('getState', null, function(data) {
        state = data;
        if (!state.donations) state.donations = [];
        if (!state.players) state.players = [];
        if (!state.tables) state.tables = [];
        if (!state.eliminations) state.eliminations = [];
        if (!state.queues) state.queues = [];
        renderAll();
      });
    }

    // --- PLAYER ACTIONS ---
    function addPlayer() {
      var name = document.getElementById('inputName').value.trim();
      var tornId = document.getElementById('inputTornId').value.trim();
      if (!name || !tornId) return toast('Name and Torn ID required', 'error');

      apiCall('addPlayer', { name: name, tornId: tornId }, function(data) {
        toast(data.message, 'success');
        document.getElementById('inputName').value = '';
        document.getElementById('inputTornId').value = '';
        document.getElementById('inputName').focus();
        fetchState();
      });
    }

    function removePlayer(tornId) {
      var player = state.players.find(function(p) { return p.tornId === tornId; });
      var name = player ? player.name : 'this player';
      showConfirm('Remove ' + name + ' from the tournament?', function() {
        apiCall('removePlayer', { tornId: tornId }, function(data) {
          toast(data.message, 'success');
          fetchState();
        });
      });
    }

    // --- DONATION ACTIONS ---
    function addDonation() {
      var donorName = document.getElementById('inputDonorName').value.trim();
      var amount = document.getElementById('inputDonationAmount').value.trim();
      if (!donorName || !amount) return toast('Donor name and amount required', 'error');

      var numAmount = parseAmount(amount);
      if (!numAmount || numAmount <= 0) return toast('Enter a valid amount', 'error');

      apiCall('addDonation', { donorName: donorName, amount: numAmount }, function(data) {
        toast(data.message, 'success');
        document.getElementById('inputDonorName').value = '';
        document.getElementById('inputDonationAmount').value = '';
        document.getElementById('inputDonorName').focus();
        fetchState();
      });
    }

    function removeDonation(index) {
      showConfirm('Remove this donation?', function() {
        apiCall('removeDonation', { index: index }, function(data) {
          toast(data.message, 'success');
          fetchState();
        });
      });
    }

    // --- RENDER ---
    function renderAll() {
      renderStatus();
      renderPlayers();
      renderDonations();
      renderTournamentPanel();
    }

    function renderStatus() {
      var badge = document.getElementById('statusBadge');
      var status = (state.settings && state.settings.tournament_status) || 'setup';
      badge.textContent = status.toUpperCase();
      badge.className = 'status-badge status-' + status;

      var isSetup = (status === 'setup');
      var addPlayerBtn = document.getElementById('btnAddPlayer');
      var lockNotice = document.getElementById('playerLockNotice');

      addPlayerBtn.disabled = !isSetup;
      document.getElementById('inputName').disabled = !isSetup;
      document.getElementById('inputTornId').disabled = !isSetup;

      if (isSetup) {
        lockNotice.classList.add('hidden');
      } else {
        lockNotice.classList.remove('hidden');
      }
    }

    function renderPlayers() {
      var list = document.getElementById('playerList');
      var count = document.getElementById('playerCount');
      var buyInTotal = document.getElementById('buyInTotal');
      var status = (state.settings && state.settings.tournament_status) || 'setup';
      var canRemove = (status === 'setup');
      var buyIn = Number(state.settings.buy_in) || 0;

      if (!state.players || state.players.length === 0) {
        list.innerHTML = '<p class="empty-list">No players yet.</p>';
        count.textContent = '0 players';
        buyInTotal.textContent = '$0';
        return;
      }

      var html = '';
      state.players.forEach(function(p) {
        html += '<div class="list-item">';
        html += '<div class="list-info">';
        html += '  <span class="list-name">' + esc(p.name) + '</span>';
        html += '  <div class="list-meta">';
        html += '    <span class="list-meta-text"><a href="https://www.torn.com/profiles.php?XID=' + esc(p.tornId) + '" target="_blank" rel="noopener">#' + esc(p.tornId) + '</a></span>';
        html += '  </div>';
        html += '</div>';

        if (canRemove) {
          html += '<button class="btn-remove" onclick="removePlayer(\'' + esc(p.tornId) + '\')">x</button>';
        }

        html += '</div>';
      });

      list.innerHTML = html;
      count.textContent = state.players.length + ' player' + (state.players.length !== 1 ? 's' : '');
      buyInTotal.textContent = formatMoney(state.players.length * buyIn);
    }

    function renderDonations() {
      var list = document.getElementById('donationList');
      var totalEl = document.getElementById('donationTotal');
      var donations = state.donations || [];

      if (donations.length === 0) {
        list.innerHTML = '<p class="empty-list">No donations yet.</p>';
        totalEl.textContent = '$0';
        return;
      }

      var html = '';
      var total = 0;
      donations.forEach(function(d, i) {
        total += (d.amount || 0);
        html += '<div class="list-item">';
        html += '  <div class="list-info">';
        html += '    <span class="list-name">' + esc(d.donorName) + '</span>';
        html += '    <span class="donation-amount">' + formatMoney(d.amount) + '</span>';
        html += '  </div>';
        html += '  <button class="btn-remove" onclick="removeDonation(' + i + ')">x</button>';
        html += '</div>';
      });

      list.innerHTML = html;
      totalEl.textContent = formatMoney(total);
    }

    // --- TOURNAMENT PANEL (tabbed: all stages + rebuy tiers) ---
    var STAGE_TABS = [
      { key: '1', label: 'Stage 1' },
      { key: 'rebuy_25', label: '25M Rebuy' },
      { key: '2', label: 'Stage 2' },
      { key: 'rebuy_50', label: '50M Rebuy' },
      { key: '3', label: 'Stage 3' },
      { key: 'rebuy_75', label: '75M Rebuy' },
      { key: '4', label: 'Stage 4' }
    ];
    var currentTab = '1';

    function tablesForStage(stage) {
      return (state.tables || []).filter(function(t) { return String(t.stage) === stage; }).sort(function(a, b) {
        var an = parseInt(String(a.tableId).replace(/[^0-9]/g, ''), 10) || 0;
        var bn = parseInt(String(b.tableId).replace(/[^0-9]/g, ''), 10) || 0;
        return an - bn;
      });
    }

    function stageStatus(stage) {
      var tabs = tablesForStage(stage);
      if (tabs.length === 0) return 'pending';
      return tabs.every(function(t) { return t.status === 'complete'; }) ? 'complete' : 'live';
    }

    function stageLabel(stage) {
      for (var i = 0; i < STAGE_TABS.length; i++) if (STAGE_TABS[i].key === stage) return STAGE_TABS[i].label;
      return stage;
    }

    function stageDescription(stage) {
      switch (stage) {
        case '1': return '9-player tables — 1st to Stage 4, 2nd to Stage 3, 3rd to Stage 2';
        case '2': return '6-player tables — 1st to Stage 4, 2nd to Stage 3';
        case '3': return '6-player tables — winner advances to Stage 4';
        case '4': return 'Phase 1 — 3 tables. Top 3 each to the final table, 4th-6th to the money table, 7th+ out';
        case 'rebuy_25': return '3-player tables — winner enters Stage 2';
        case 'rebuy_50': return '3-player tables — winner enters Stage 3';
        case 'rebuy_75': return '3-player tables — winner enters Stage 4';
      }
      return '';
    }

    // Client-side mirror of checkStageGate_ — returns {ok:true} or {reason:'...'}.
    function gateForStage(stage) {
      function allComplete(s) { var t = tablesForStage(s); return t.length > 0 && t.every(function(x) { return x.status === 'complete'; }); }
      function exists(s) { return tablesForStage(s).length > 0; }
      if (stage === '2') {
        if (!exists('1')) return { reason: 'Stage 1 not generated yet' };
        if (!allComplete('1')) return { reason: 'All Stage 1 tables must be complete first' };
        if (exists('rebuy_25') && !allComplete('rebuy_25')) return { reason: 'All 25M rebuy tables must be complete first' };
        return { ok: true };
      }
      if (stage === '3') {
        if (!exists('2')) return { reason: 'Stage 2 not generated yet' };
        if (!allComplete('2')) return { reason: 'All Stage 2 tables must be complete first' };
        if (exists('rebuy_50') && !allComplete('rebuy_50')) return { reason: 'All 50M rebuy tables must be complete first' };
        return { ok: true };
      }
      if (stage === 'rebuy_25') {
        if (!exists('1')) return { reason: 'Stage 1 not generated yet' };
        if (!allComplete('1')) return { reason: 'All Stage 1 tables must be complete first' };
        return { ok: true };
      }
      if (stage === 'rebuy_50') {
        if (!exists('2')) return { reason: 'Stage 2 not generated yet' };
        if (!allComplete('2')) return { reason: 'All Stage 2 tables must be complete first' };
        return { ok: true };
      }
      if (stage === 'rebuy_75') {
        if (!exists('3')) return { reason: 'Stage 3 not generated yet' };
        if (!allComplete('3')) return { reason: 'All Stage 3 tables must be complete first' };
        return { ok: true };
      }
      if (stage === '4') {
        if (!exists('3')) return { reason: 'Stage 3 not generated yet' };
        if (!allComplete('3')) return { reason: 'All Stage 3 tables must be complete first' };
        if (exists('rebuy_75') && !allComplete('rebuy_75')) return { reason: 'All 75M rebuy tables must be complete first' };
        return { ok: true };
      }
      return { reason: '' };
    }

    function renderTournamentPanel() {
      var container = document.getElementById('panelContent');

      var html = '<div class="stage-tabs">';
      STAGE_TABS.forEach(function(tab) {
        var st = stageStatus(tab.key);
        var active = (tab.key === currentTab) ? ' active' : '';
        html += '<button class="stage-tab' + active + '" data-tab="' + tab.key + '">' +
          esc(tab.label) + '<span class="stage-tab-dot ' + st + '">' + st + '</span></button>';
      });
      html += '</div>';
      html += '<div class="stage-tab-body" id="stageTabBody"></div>';
      container.innerHTML = html;

      container.querySelectorAll('.stage-tab').forEach(function(b) {
        b.addEventListener('click', function() {
          currentTab = b.getAttribute('data-tab');
          renderTournamentPanel();
        });
      });

      renderStageTab(currentTab);
    }

    function renderStageTab(stage) {
      var body = document.getElementById('stageTabBody');
      var tables = tablesForStage(stage);
      var anyComplete = tables.some(function(t) { return t.status === 'complete'; });

      var html = '';
      html += '<div class="stage-head">';
      html += '<span class="stage-head-title">' + esc(stageLabel(stage)) + '</span>';
      html += '<span class="stage-head-desc">' + esc(stageDescription(stage)) + '</span>';
      if (stage === '1' && tables.length > 0 && !anyComplete) {
        html += '<div class="stage-head-actions"><button class="btn-reseat-tab" id="btnReseat">Re-randomise seating</button></div>';
      }
      html += '</div>';

      if (/^rebuy_/.test(stage)) {
        html += renderRebuySection(stage);
      }

      if (tables.length === 0) {
        if (stage === '1') {
          // Stage 1 seating is generated from availability in the availability admin.
          html += renderStartCta();
        } else {
          var gate = gateForStage(stage);
          html += '<div class="stage-empty">';
          if (gate.ok) {
            html += '<p>No tables generated yet.</p>';
            html += '<button class="btn-generate" data-gen-stage="' + esc(stage) + '">Generate ' + esc(stageLabel(stage)) + ' tables</button>';
          } else {
            html += '<p class="stage-pending"><span class="pending-tag">Pending</span> ' + esc(gate.reason || 'Not available yet') + '</p>';
          }
          html += '</div>';
          html += renderQueueFor(stage);
        }
      } else {
        html += '<div class="stage-block-body">';
        tables.forEach(function(t) { html += renderTableCard(t); });
        html += '</div>';
      }

      body.innerHTML = html;
      wireStageTab(stage);
    }

    function renderQueueFor(stage) {
      var key = /^rebuy_/.test(stage) ? stage : ('stage_' + stage);
      var queued = (state.queues || []).filter(function(q) { return q.queuedFor === key; });
      if (queued.length === 0) return '';
      var html = '<div class="queue-list-box"><div class="queue-list-title">Qualified / waiting (' + queued.length + ')</div><div class="queue-list">';
      queued.forEach(function(q) { html += '<span class="queue-chip">' + esc(q.name || q.tornId) + '</span>'; });
      html += '</div></div>';
      return html;
    }

    function renderRebuySection(stage) {
      var lossStage = (stage === 'rebuy_25') ? 1 : (stage === 'rebuy_50') ? 2 : 3;
      var confirmedIds = {};
      (state.queues || []).forEach(function(q) { if (q.queuedFor === stage) confirmedIds[q.tornId] = true; });

      var requests = (state.eliminations || []).filter(function(e) {
        return Number(e.stageLostAt) === lossStage && String(e.rebuyTaken).toLowerCase() === 'yes' && !confirmedIds[e.tornId];
      });
      var confirmed = (state.queues || []).filter(function(q) { return q.queuedFor === stage; });

      var html = '<div class="rebuy-admin">';
      html += '<div class="rebuy-admin-col">';
      html += '<div class="rebuy-admin-title">Requests — awaiting payment (' + requests.length + ')</div>';
      if (requests.length === 0) {
        html += '<p class="rebuy-admin-empty">No pending requests.</p>';
      } else {
        requests.forEach(function(r) {
          html += '<div class="rebuy-req"><span>' + esc(r.name || r.tornId) + '</span>' +
            '<button class="btn-confirm-rebuy" data-torn-id="' + esc(r.tornId) + '">Confirm paid</button></div>';
        });
      }
      html += '</div>';
      html += '<div class="rebuy-admin-col">';
      html += '<div class="rebuy-admin-title">Confirmed / paid (' + confirmed.length + ')</div>';
      if (confirmed.length === 0) {
        html += '<p class="rebuy-admin-empty">None confirmed yet.</p>';
      } else {
        confirmed.forEach(function(c) {
          html += '<div class="rebuy-req"><span>' + esc(c.name || c.tornId) + '</span><span class="paid-tag">paid</span></div>';
        });
      }
      html += '</div></div>';
      return html;
    }

    function wireStageTab(stage) {
      var body = document.getElementById('stageTabBody');
      if (!body) return;
      var reseatBtn = document.getElementById('btnReseat');
      if (reseatBtn) reseatBtn.addEventListener('click', reseatStage1);
      var genBtn = body.querySelector('.btn-generate');
      if (genBtn) genBtn.addEventListener('click', function() { generateStage(genBtn.getAttribute('data-gen-stage')); });
      body.querySelectorAll('.btn-confirm-rebuy').forEach(function(b) {
        b.addEventListener('click', function() { confirmRebuy(b.getAttribute('data-torn-id')); });
      });
    }

    function generateStage(stage) {
      apiCall('previewStageTables', { stage: stage }, function(preview) {
        if (!preview || !preview.plan) { toast('Nothing to generate', 'error'); return; }
        var count = 0;
        preview.plan.forEach(function(e) { count += e.tables.length; });
        if (count === 0) { toast('No players available to seat', 'error'); return; }
        // Hand off to the seating editor so the draw can be refined before it goes live.
        var payload = {
          stage: preview.stage,
          tableSize: preview.tableSize,
          plan: preview.plan,
          availability: state.availability || [],
          returnTo: 'admin'
        };
        try {
          sessionStorage.setItem('seatingEditor.plan', JSON.stringify(payload));
        } catch (e) {
          toast('Could not open seating editor: ' + e.message, 'error');
          return;
        }
        window.location.href = 'seating-editor';
      });
    }

    function confirmRebuy(tornId) {
      apiCall('confirmRebuy', { tornId: tornId }, function(data) {
        toast(data.message || 'Rebuy confirmed', 'success');
        fetchState();
      });
    }

    function renderStartCta() {
      var enoughPlayers = state.players && state.players.length >= 2;
      return '<div class="start-cta">' +
        '<h3>Setup</h3>' +
        '<p>Stage 1 tables are generated from player availability picks.' +
        (enoughPlayers ? '' : '<br><strong style="color: var(--text-dim);">Add at least 2 players to continue.</strong>') +
        '</p>' +
        '<p style="margin-top: 16px;">Once players are registered, go to the availability admin to generate Stage 1 tables. Committing the tables will lock the roster and start the tournament.</p>' +
        '<a href="availability-admin" style="display: inline-block; margin-top: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 700; padding: 10px 24px; border-radius: 5px; background: var(--accent); color: var(--bg); text-decoration: none;' + (enoughPlayers ? '' : ' opacity: 0.4; pointer-events: none;') + '">Open availability admin</a>' +
        '</div>';
    }

    function renderTableCard(t) {
      var isComplete = t.status === 'complete';
      var html = '<div class="table-card' + (isComplete ? ' complete' : '') + '" data-table-id="' + esc(t.tableId) + '">';

      html += '<div class="table-card-header">';
      html += '<span class="table-card-id">' + esc(t.tableId);
      if (t.notes) html += '<span class="table-card-id-note">' + esc(t.notes) + '</span>';
      html += '</span>';
      html += '<span class="table-status-tag ' + t.status + '">' + esc(t.status) + '</span>';
      html += '</div>';

      // Players grid
      html += '<div class="table-players">';
      t.players.forEach(function(pid) {
        var p = findPlayerById(pid);
        if (!p) return;
        var cls = '';
        var prefix = '';
        if (isComplete) {
          if (t.place1 === pid) { cls = 'placed-1'; prefix = '1st'; }
          else if (t.place2 === pid) { cls = 'placed-2'; prefix = '2nd'; }
          else if (t.place3 === pid) { cls = 'placed-3'; prefix = '3rd'; }
          else cls = 'eliminated';
        }
        html += '<div class="table-player-cell ' + cls + '">';
        if (prefix) html += '<span class="place-prefix">' + prefix + '</span>';
        html += esc(p.name);
        html += '</div>';
      });
      html += '</div>';

      html += '</div>';
      return html;
    }

    function findPlayerById(tornId) {
      return (state.players || []).filter(function(p) { return p.tornId === String(tornId); })[0];
    }

    // --- TOURNAMENT ACTIONS ---
    function startTournament() {
      showConfirm('Lock the roster and start Stage 1? Players will be randomly seated.', function() {
        apiCall('startTournament', null, function(data) {
          toast(data.message || 'Tournament started', 'success');
          fetchState();
        });
      });
    }

    function reseatStage1() {
      showConfirm('Re-randomise Stage 1 seating? All current Stage 1 tables will be wiped and redrawn.', function() {
        apiCall('reseatStage1', null, function(data) {
          toast(data.message || 'Reseated', 'success');
          fetchState();
        });
      });
    }

    // --- HELPERS ---
    function formatMoney(amount) {
      if (!amount) return '$0';
      if (amount >= 1000000000) return '$' + (amount / 1000000000).toFixed(1).replace(/\.0$/, '') + 'B';
      if (amount >= 1000000) return '$' + (amount / 1000000).toFixed(0) + 'M';
      if (amount >= 1000) return '$' + (amount / 1000).toFixed(0) + 'K';
      return '$' + amount;
    }

    // Parses amounts with optional k/m/b suffixes, e.g. "5m" -> 5000000, "1.5b" -> 1500000000
    function parseAmount(raw) {
      var str = String(raw).trim().toLowerCase().replace(/[$,\s]/g, '');
      if (!str) return NaN;
      var multiplier = 1;
      var last = str.charAt(str.length - 1);
      if (last === 'k') { multiplier = 1000; str = str.slice(0, -1); }
      else if (last === 'm') { multiplier = 1000000; str = str.slice(0, -1); }
      else if (last === 'b') { multiplier = 1000000000; str = str.slice(0, -1); }
      var num = parseFloat(str);
      if (isNaN(num)) return NaN;
      return Math.round(num * multiplier);
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
    }

    function toast(message, type) {
      var container = document.getElementById('toasts');
      var el = document.createElement('div');
      el.className = 'toast toast-' + (type || 'success');
      el.textContent = message;
      container.appendChild(el);
      setTimeout(function() { el.remove(); }, 3000);
    }

    function showConfirm(message, onConfirm) {
      var overlay = document.getElementById('confirmOverlay');
      document.getElementById('confirmMessage').textContent = message;
      overlay.classList.remove('hidden');

      var okBtn = document.getElementById('confirmOk');
      var cancelBtn = document.getElementById('confirmCancel');

      function cleanup() {
        overlay.classList.add('hidden');
        okBtn.removeEventListener('click', handleOk);
        cancelBtn.removeEventListener('click', handleCancel);
      }

      function handleOk() { cleanup(); onConfirm(); }
      function handleCancel() { cleanup(); }

      okBtn.addEventListener('click', handleOk);
      cancelBtn.addEventListener('click', handleCancel);
    }

    function esc(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }
  </script>

</body>
</html>
