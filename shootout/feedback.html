<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Progressive Shootout // Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260606">
  <style>
    /* Feedback survey — layered on the shared form classes (body.avail inherits
       the form-card / form-input / btn-submit styling). */
    body.avail .form-section { max-width: 760px; }
    body.avail .hero-blurb { max-width: 640px; color: #e2e6ed; }
    body.avail .hero-blurb strong { color: #fff; }
    body.avail .btn-submit { background: #ffc24d; color: #1a1d24; }
    body.avail .btn-submit:hover:not(:disabled) { background: #ffce6b; }

    .fb-q { padding: 20px 0; border-top: 1px solid #353f4f; }
    .fb-q:first-child { border-top: none; padding-top: 4px; }
    .fb-q-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 13px; }
    .fb-q-num {
      font-family: var(--font-mono, monospace); font-weight: 800; font-size: 13px;
      color: #ffc24d; flex: 0 0 auto;
    }
    .fb-q-label { font-family: var(--font-body); font-weight: 600; font-size: 16px; color: #fff; }

    /* Multiple-choice options */
    .fb-opts { display: flex; flex-wrap: wrap; gap: 8px; padding-left: 28px; }
    .fb-opt {
      font-family: var(--font-mono, monospace); font-size: 13px; font-weight: 600;
      padding: 9px 15px; border-radius: 999px; cursor: pointer;
      background: #2c3441; border: 1.5px solid #4a566b; color: #dbe0e8;
      transition: border-color .15s, background .15s, color .15s, transform .1s;
    }
    .fb-opt:hover { border-color: #ffc24d; color: #fff; transform: translateY(-1px); }
    .fb-opt.selected { border-color: #ffc24d; background: rgba(255, 194, 77, 0.18); color: #ffd373; }

    .fb-extra { padding: 20px 0 4px; border-top: 1px solid #353f4f; }
    .fb-label {
      display: block; font-family: var(--font-mono, monospace); font-weight: 700;
      font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
      color: #cbd1db; margin-bottom: 9px;
    }
    .fb-label .fb-optional { color: #8a92a0; font-weight: 600; text-transform: none; letter-spacing: 0; }
    body.avail textarea.form-input { min-height: 110px; resize: vertical; line-height: 1.5; }
    .fb-extra + .fb-extra { padding-top: 18px; }
  </style>
</head>
<body class="avail">

  <header class="header">
    <h1><a href="./">PROGRESSIVE SHOOTOUT</a> // FEEDBACK</h1>
    <div class="header-right">
      <a class="btn-pill" href="./">Tournament</a>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero-title">Tell us what you think</h1>
    <p class="hero-blurb"><strong>A few quick questions — takes about a minute.</strong> Answer what you like, add a comment if you've got one. You can stay anonymous; every response gets read.</p>
  </section>

  <section class="form-section">
    <div class="form-card">

      <div id="questions"></div>

      <div class="fb-extra">
        <label class="fb-label" for="commentsInput">Anything else? <span class="fb-optional">— optional</span></label>
        <textarea class="form-input" id="commentsInput" maxlength="4000"
          placeholder="A bug, an idea, or just what's on your mind…"></textarea>
      </div>

      <div class="fb-extra">
        <label class="fb-label" for="nameInput">Name <span class="fb-optional">— optional</span></label>
        <input type="text" class="form-input" id="nameInput" placeholder="So we know who to thank" autocomplete="off" maxlength="120">
      </div>

      <div class="submit-row">
        <div class="submit-summary" id="submitSummary"></div>
        <button class="btn-submit" id="btnSubmit" disabled>Send Feedback</button>
      </div>

      <div class="form-message" id="formMessage"></div>

    </div>
  </section>

  <div class="toast-container" id="toasts"></div>

  <footer class="site-footer">
    Made by <a href="https://www.torn.com/profiles.php?XID=3583736" target="_blank" rel="noopener">Systoned</a>
  </footer>

  <script src="config.js"></script>
  <script>
    var QUESTIONS = [
      { key: 'overall',   label: 'Overall, how has the tournament been for you?',
        options: ['Loving it', 'Good', "It's fine", 'Not great', 'Rough'] },
      { key: 'clarity',   label: 'How clear were the rules and stage structure?',
        options: ['Crystal clear', 'Mostly clear', 'A bit confusing', 'Lost most of the time'] },
      { key: 'seating',   label: 'How well did the seating & availability scheduling work for you?',
        options: ['Worked great', 'Mostly fine', 'A few issues', "Didn't work for me"] },
      { key: 'pace',      label: 'How was the pace and timing of the stages?',
        options: ['Too slow', 'Just right', 'Too fast'] },
      { key: 'returning', label: 'Would you join another Progressive Shootout?',
        options: ['Definitely', 'Probably', 'Maybe', 'No'] }
    ];

    var answers = {};

    document.addEventListener('DOMContentLoaded', function() {
      renderQuestions();
      document.getElementById('commentsInput').addEventListener('input', updateSubmitState);
      document.getElementById('btnSubmit').addEventListener('click', submit);
      updateSubmitState();
    });

    function renderQuestions() {
      var wrap = document.getElementById('questions');
      wrap.innerHTML = '';
      QUESTIONS.forEach(function(q, i) {
        var block = document.createElement('div');
        block.className = 'fb-q';

        var head = document.createElement('div');
        head.className = 'fb-q-head';
        head.innerHTML = '<span class="fb-q-num">' + pad2(i + 1) + '</span>' +
                         '<span class="fb-q-label">' + esc(q.label) + '</span>';
        block.appendChild(head);

        var opts = document.createElement('div');
        opts.className = 'fb-opts';
        q.options.forEach(function(opt) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'fb-opt' + (answers[q.key] === opt ? ' selected' : '');
          b.textContent = opt;
          b.addEventListener('click', function() {
            // Tap the chosen answer again to clear it.
            answers[q.key] = (answers[q.key] === opt) ? null : opt;
            renderQuestions();
            updateSubmitState();
          });
          opts.appendChild(b);
        });
        block.appendChild(opts);
        wrap.appendChild(block);
      });
    }

    function answeredCount() {
      return QUESTIONS.filter(function(q) { return answers[q.key]; }).length;
    }

    function updateSubmitState() {
      var n = answeredCount();
      var hasComment = document.getElementById('commentsInput').value.trim().length > 0;
      var btn = document.getElementById('btnSubmit');
      var summary = document.getElementById('submitSummary');
      if (n === 0 && !hasComment) {
        btn.disabled = true;
        summary.textContent = 'Answer a question or add a comment to send.';
      } else {
        btn.disabled = false;
        summary.textContent = n + ' of ' + QUESTIONS.length + ' answered' + (hasComment ? ' · comment added' : '');
      }
    }

    function getBrowserId() {
      var key = 'shootout_browser_id';
      try {
        var existing = localStorage.getItem(key);
        if (existing) return existing;
        var fresh = (typeof crypto !== 'undefined' && crypto.randomUUID)
          ? crypto.randomUUID()
          : 'b_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
        localStorage.setItem(key, fresh);
        return fresh;
      } catch (_) { return ''; }
    }

    function submit() {
      var btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      hideMessage();

      var url = API_URL + '?action=submitFeedback' +
        '&comments=' + encodeURIComponent(document.getElementById('commentsInput').value.trim()) +
        '&name=' + encodeURIComponent(document.getElementById('nameInput').value.trim()) +
        '&browserId=' + encodeURIComponent(getBrowserId());
      QUESTIONS.forEach(function(q) {
        url += '&' + q.key + '=' + encodeURIComponent(answers[q.key] || '');
      });

      fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          btn.textContent = 'Send Feedback';
          if (data.error) {
            showMessage(data.error, 'error');
            btn.disabled = false;
          } else {
            showMessage(data.message || 'Thanks — your feedback was sent.', 'success');
            toast('Feedback sent', 'success');
            resetForm();
          }
        })
        .catch(function(err) {
          btn.textContent = 'Send Feedback';
          btn.disabled = false;
          showMessage('Couldn’t send: ' + err.message, 'error');
        });
    }

    function resetForm() {
      answers = {};
      document.getElementById('commentsInput').value = '';
      document.getElementById('nameInput').value = '';
      renderQuestions();
      updateSubmitState();
    }

    function showMessage(text, type) {
      var el = document.getElementById('formMessage');
      el.textContent = text;
      el.className = 'form-message show ' + type;
    }

    function hideMessage() {
      document.getElementById('formMessage').className = 'form-message';
    }

    function toast(message, type) {
      var container = document.getElementById('toasts');
      var el = document.createElement('div');
      el.className = 'toast toast-' + (type || 'success');
      el.textContent = message;
      container.appendChild(el);
      setTimeout(function() { el.remove(); }, 3000);
    }

    function pad2(n) { return n < 10 ? '0' + n : String(n); }

    function esc(str) {
      if (str === null || str === undefined) return '';
      var div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }
  </script>

</body>
</html>
