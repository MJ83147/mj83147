<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Progressive Shootout // Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260606">
  <style>
    /* Feedback page — self-contained styles layered on the shared form classes
       (body.avail inherits all the form-card / form-input / btn-submit styling). */
    body.avail .form-section { max-width: 720px; }
    body.avail .hero-blurb { max-width: 640px; color: #e2e6ed; }
    body.avail .hero-blurb strong { color: #fff; }
    body.avail .form-step-num { color: #ffc24d; }
    body.avail .form-step-title { color: #fff; }
    body.avail .form-step-help { color: #ccd2dc; }
    body.avail .btn-submit { background: #ffc24d; color: #1a1d24; }
    body.avail .btn-submit:hover:not(:disabled) { background: #ffce6b; }

    .fb-field { margin-bottom: 22px; }
    .fb-field:last-of-type { margin-bottom: 0; }
    .fb-label {
      display: block; font-family: var(--font-mono, monospace); font-weight: 700;
      font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
      color: #cbd1db; margin-bottom: 9px;
    }
    .fb-label .fb-optional { color: #8a92a0; font-weight: 600; text-transform: none; letter-spacing: 0; }

    /* Category chips */
    .fb-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .fb-chip {
      font-family: var(--font-mono, monospace); font-size: 13px; font-weight: 600;
      padding: 9px 15px; border-radius: 999px; cursor: pointer;
      background: #2c3441; border: 1.5px solid #4a566b; color: #dbe0e8;
      transition: border-color .15s, background .15s, color .15s;
    }
    .fb-chip:hover { border-color: #ffc24d; color: #fff; }
    .fb-chip.selected { border-color: #ffc24d; background: rgba(255, 194, 77, 0.18); color: #ffd373; }

    body.avail textarea.form-input { min-height: 150px; resize: vertical; line-height: 1.5; }
    .fb-row { display: flex; gap: 14px; }
    .fb-row > div { flex: 1; }
    @media (max-width: 520px) { .fb-row { flex-direction: column; gap: 22px; } }

    /* Star rating */
    .fb-stars { display: flex; gap: 6px; }
    .fb-star {
      background: none; border: none; padding: 2px; cursor: pointer; line-height: 1;
      font-size: 30px; color: #4a566b; transition: color .12s, transform .1s;
    }
    .fb-star:hover { transform: scale(1.12); }
    .fb-star.on { color: #ffc24d; }
    .fb-stars-hint { font-size: 13px; color: #9aa2b0; margin-top: 7px; min-height: 18px; }
  </style>
</head>
<body class="avail">

  <header class="header">
    <h1><a href="./">PROGRESSIVE SHOOTOUT</a> // FEEDBACK</h1>
    <div class="header-right">
      <a class="btn-pill" href="./">Tournament</a>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero-title">Tell us what you think</h1>
    <p class="hero-blurb"><strong>Found a bug, got an idea, or just want to vent about the seating?</strong> Drop it here. You can leave your name or stay anonymous — every note gets read.</p>
  </section>

  <section class="form-section">
    <div class="form-card">

      <div class="form-step">
        <div class="form-step-header">
          <span class="form-step-num">01</span>
          <span class="form-step-title">What's this about?</span>
        </div>
        <div class="fb-field">
          <div class="fb-chips" id="categoryChips"></div>
        </div>

        <div class="fb-field">
          <label class="fb-label" for="messageInput">Your message</label>
          <textarea class="form-input" id="messageInput" rows="6" maxlength="4000"
            placeholder="What happened, what you'd change, or what's working well…"></textarea>
        </div>

        <div class="fb-field">
          <label class="fb-label">How's the tournament going for you? <span class="fb-optional">— optional</span></label>
          <div class="fb-stars" id="starRow"></div>
          <div class="fb-stars-hint" id="starHint"></div>
        </div>

        <div class="fb-field fb-row">
          <div>
            <label class="fb-label" for="nameInput">Name <span class="fb-optional">— optional</span></label>
            <input type="text" class="form-input" id="nameInput" placeholder="So we know who to thank" autocomplete="off" maxlength="120">
          </div>
          <div>
            <label class="fb-label" for="tornIdInput">Torn ID <span class="fb-optional">— optional</span></label>
            <input type="text" class="form-input" id="tornIdInput" placeholder="e.g. 3583736" autocomplete="off" inputmode="numeric" maxlength="20">
          </div>
        </div>
      </div>

      <div class="submit-row">
        <div class="submit-summary" id="submitSummary">Write a message to send your feedback.</div>
        <button class="btn-submit" id="btnSubmit" disabled>Send Feedback</button>
      </div>

      <div class="form-message" id="formMessage"></div>

    </div>
  </section>

  <div class="toast-container" id="toasts"></div>

  <footer class="site-footer">
    Made by <a href="https://www.torn.com/profiles.php?XID=3583736" target="_blank" rel="noopener">Systoned</a>
  </footer>

  <script src="config.js"></script>
  <script>
    var CATEGORIES = ['General', 'Bug', 'Suggestion', 'Seating & availability', 'Other'];
    var STAR_HINTS = ['', 'Rough', 'Meh', 'Good', 'Great', 'Loving it'];
    var selected = { category: 'General', rating: 0 };

    document.addEventListener('DOMContentLoaded', function() {
      renderChips();
      renderStars();
      document.getElementById('messageInput').addEventListener('input', updateSubmitState);
      document.getElementById('btnSubmit').addEventListener('click', submit);
      updateSubmitState();
    });

    function renderChips() {
      var wrap = document.getElementById('categoryChips');
      wrap.innerHTML = '';
      CATEGORIES.forEach(function(cat) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'fb-chip' + (cat === selected.category ? ' selected' : '');
        btn.textContent = cat;
        btn.addEventListener('click', function() {
          selected.category = cat;
          renderChips();
        });
        wrap.appendChild(btn);
      });
    }

    function renderStars() {
      var row = document.getElementById('starRow');
      row.innerHTML = '';
      for (var i = 1; i <= 5; i++) {
        (function(n) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'fb-star' + (n <= selected.rating ? ' on' : '');
          b.textContent = '★';
          b.setAttribute('aria-label', n + ' star' + (n > 1 ? 's' : ''));
          b.addEventListener('click', function() {
            // Click the current rating again to clear it.
            selected.rating = (selected.rating === n) ? 0 : n;
            renderStars();
          });
          row.appendChild(b);
        })(i);
      }
      document.getElementById('starHint').textContent = STAR_HINTS[selected.rating] || '';
    }

    function updateSubmitState() {
      var msg = document.getElementById('messageInput').value.trim();
      var btn = document.getElementById('btnSubmit');
      var summary = document.getElementById('submitSummary');
      if (!msg) {
        btn.disabled = true;
        summary.textContent = 'Write a message to send your feedback.';
      } else {
        btn.disabled = false;
        summary.textContent = 'Ready to send.';
      }
    }

    function getBrowserId() {
      var key = 'shootout_browser_id';
      try {
        var existing = localStorage.getItem(key);
        if (existing) return existing;
        var fresh = (typeof crypto !== 'undefined' && crypto.randomUUID)
          ? crypto.randomUUID()
          : 'b_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
        localStorage.setItem(key, fresh);
        return fresh;
      } catch (_) { return ''; }
    }

    function submit() {
      var message = document.getElementById('messageInput').value.trim();
      if (!message) return;
      var btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      hideMessage();

      var url = API_URL +
        '?action=submitFeedback' +
        '&category=' + encodeURIComponent(selected.category) +
        '&rating=' + encodeURIComponent(selected.rating || '') +
        '&message=' + encodeURIComponent(message) +
        '&name=' + encodeURIComponent(document.getElementById('nameInput').value.trim()) +
        '&tornId=' + encodeURIComponent(document.getElementById('tornIdInput').value.trim()) +
        '&browserId=' + encodeURIComponent(getBrowserId());

      fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          btn.textContent = 'Send Feedback';
          if (data.error) {
            showMessage(data.error, 'error');
            btn.disabled = false;
          } else {
            showMessage(data.message || 'Thanks — your feedback was sent.', 'success');
            toast('Feedback sent', 'success');
            resetForm();
          }
        })
        .catch(function(err) {
          btn.textContent = 'Send Feedback';
          btn.disabled = false;
          showMessage('Couldn’t send: ' + err.message, 'error');
        });
    }

    function resetForm() {
      document.getElementById('messageInput').value = '';
      document.getElementById('nameInput').value = '';
      document.getElementById('tornIdInput').value = '';
      selected.category = 'General';
      selected.rating = 0;
      renderChips();
      renderStars();
      updateSubmitState();
    }

    function showMessage(text, type) {
      var el = document.getElementById('formMessage');
      el.textContent = text;
      el.className = 'form-message show ' + type;
    }

    function hideMessage() {
      document.getElementById('formMessage').className = 'form-message';
    }

    function toast(message, type) {
      var container = document.getElementById('toasts');
      var el = document.createElement('div');
      el.className = 'toast toast-' + (type || 'success');
      el.textContent = message;
      container.appendChild(el);
      setTimeout(function() { el.remove(); }, 3000);
    }
  </script>

</body>
</html>
